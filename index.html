<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    
    <!-- תגיות Meta לתצוגה מקדימה (Social Media Preview) -->
<meta property="og:title" content="אירועים קרובים ג'1">
<meta property="og:description" content="לוח אירועים, מבחנים ומטלות לכיתה ג'1.">
<meta property="og:image" content="https://ronel99.github.io/kids_school_eitan/thumbnail.png">
<meta property="og:url" content="https://ronel99.github.io/kids_school_eitan/">
<meta property="og:type" content="website">

<!-- תגיות עבור WhatsApp ו-Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://ronel99.github.io/kids_school_eitan/thumbnail.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>אירועים קרובים ג'1</title>
    <style>
        :root {
            --primary-blue: #3b82f6;
            --secondary-green: #10b981;
            --text-main: #1e293b;
            --text-sub: #475569;
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 550px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 25px;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            font-size: 2rem;
            margin-bottom: 30px;
            font-weight: 800;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .event-item {
            display: flex;
            align-items: center;
            padding: 14px;
            border-radius: 16px;
            background: #fff;
            border: 1px solid #f1f5f9;
        }

        .date {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            width: 85px;
            flex-shrink: 0;
        }

        .title {
            flex-grow: 1;
            font-size: 1.05rem;
            color: var(--text-sub);
            padding: 0 10px;
            text-align: right;
            font-weight: 500;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-link {
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.2s;
        }

        /* כפתור חומר לימודי - כחול */
        .btn-material {
            background-color: var(--primary-blue);
            color: white;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.15);
            min-width: 90px;
        }

        /* כפתור יומן - ירוק */
        .btn-calendar {
            background-color: white;
            color: var(--secondary-green);
            border: 1px solid var(--secondary-green);
        }

        .btn-link:hover {
            transform: translateY(-1px);
            filter: brightness(0.95);
        }

        .loading { text-align: center; color: #94a3b8; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>אירועים קרובים ג'1</h1>
    <div id="loader" class="loading">טוען נתונים...</div>
    <div id="event-list" class="event-list"></div>
</div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3CbYUVUDzXq2mZ1eZ0u1VQPJuZ7tUj3cGjYad9WDHq5ezf5kveHHQ2UrAcKWlV-7dJsgKM35tsud7/pub?gid=0&single=true&output=csv';
    const CACHE_BUSTER = `&t=${new Date().getTime()}`;

    // פונקציה ליצירת קישור הוספה ליומן גוגל
    function generateCalendarLink(title, dateStr) {
        try {
            // הנחה: התאריך בפורמט D/M (למשל 12/5)
            const parts = dateStr.split('/');
            const day = parts[0].padStart(2, '0');
            const month = parts[1].padStart(2, '0');
            const year = new Date().getFullYear();
            
            // יצירת מחרוזת תאריך בפורמט YYYYMMDD
            const formattedDate = `${year}${month}${day}`;
            const googleDate = `${formattedDate}/${formattedDate}`;
            
            const baseUrl = "https://www.google.com/calendar/render?action=TEMPLATE";
            const url = `${baseUrl}&text=${encodeURIComponent(title + " - כיתה ג'1")}&dates=${googleDate}&details=${encodeURIComponent("הוסף דרך אפליקציית האירועים")}`;
            
            return url;
        } catch (e) {
            return "#";
        }
    }

    function formatDriveLink(url) {
        if (url.includes('drive.google.com')) {
            const fileIdMatch = url.match(/\/d\/([^/]+)/) || url.match(/id=([^&]+)/);
            if (fileIdMatch && fileIdMatch[1]) {
                return `https://drive.google.com/file/d/${fileIdMatch[1]}/view?usp=sharing`;
            }
        }
        return url;
    }

    function getFileIcon(buttonText) {
        const lowerText = buttonText.toLowerCase();
        if (lowerText.includes('מבחן') || lowerText.includes('חומר') || lowerText.includes('דף')) return '📄';
        if (lowerText.includes('מצגת') || lowerText.includes('צפה')) return '🖼️';
        if (lowerText.includes('פרטים')) return 'i️';
        return '📂';
    }

    async function fetchEvents() {
        try {
            const response = await fetch(SHEET_CSV_URL + CACHE_BUSTER);
            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1); 
            const listContainer = document.getElementById('event-list');
            
            document.getElementById('loader').style.display = 'none';
            listContainer.innerHTML = '';

            rows.forEach(row => {
                const columns = row.split(',').map(col => col.trim());
                if (columns.length >= 2) {
                    const dateStr = columns[0];
                    const title = columns[1];
                    let link = columns[2] || '';
                    let buttonText = (columns[3] && columns[3] !== "") ? columns[3] : "חומר";

                    const calendarUrl = generateCalendarLink(title, dateStr);
                    const hasLink = link.toLowerCase().startsWith('http');
                    const icon = getFileIcon(buttonText);

                    let html = `
                        <div class="event-item">
                            <span class="date">${dateStr}</span>
                            <span class="title">${title}</span>
                            <div class="action-buttons">
                                <a href="${calendarUrl}" target="_blank" class="btn-link btn-calendar" title="הוסף ליומן">
                                    <span>📅</span>
                                </a>
                                ${hasLink ? `
                                    <a href="${formatDriveLink(link)}" target="_blank" class="btn-link btn-material">
                                        <span>${icon}</span>
                                        <span>${buttonText}</span>
                                    </a>
                                ` : ''}
                            </div>
                        </div>
                    `;
                    listContainer.innerHTML += html;
                }
            });
        } catch (error) {
            document.getElementById('loader').innerText = 'שגיאה בטעינה.';
        }
    }

    fetchEvents();
</script>

</body>
</html>
