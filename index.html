<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אירועים קרובים ג'1 - דינמי</title>
    <style>
        /* (הסטייל נשאר זהה למה שנתתי קודם, רק הוספתי אנימציית טעינה קטנה) */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 500px; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #334155; }
        .event-list { display: flex; flex-direction: column; gap: 15px; }
        .event-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 12px; border-bottom: 1px solid #eee; }
        .date { font-size: 1.3rem; font-weight: bold; min-width: 90px; }
        .title { flex-grow: 1; font-size: 1.1rem; }
        .btn-link { background: #3b82f6; color: white; text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; }
        .loading { text-align: center; color: #64748b; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>אירועים קרובים ג'1</h1>
    <div id="loader" class="loading">טוען נתונים מהגיליון...</div>
    <div class="event-list" id="event-list">
        <!-- הנתונים יוזרקו כאן ע"י ה-JavaScript -->
    </div>
</div>

<script>
    // החלף את הכתובת הזו בקישור ה-CSV מה-Google Sheet שלך
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3CbYUVUDzXq2mZ1eZ0u1VQPJuZ7tUj3cGjYad9WDHq5ezf5kveHHQ2UrAcKWlV-7dJsgKM35tsud7/pub?gid=0&single=true&output=csv';

    async function fetchEvents() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            
            // עיבוד ה-CSV (דילוג על שורת הכותרת)
            const rows = data.split('\n').slice(1);
            const listContainer = document.getElementById('event-list');
            const loader = document.getElementById('loader');
            
            listContainer.innerHTML = ''; // ניקוי הרשימה
            loader.style.display = 'none';

            rows.forEach(row => {
                const columns = row.split(',');
                if (columns.length >= 2) {
                    const date = columns[0].trim();
                    const title = columns[1].trim();
                    const link = columns[2] ? columns[2].trim() : '#';

                    const eventHtml = `
                        <div class="event-item">
                            <span class="date">${date}</span>
                            <span class="title">${title}</span>
                            ${link !== '#' ? `<a href="${link}" target="_blank" class="btn-link">חומר למטלה</a>` : ''}
                        </div>
                    `;
                    listContainer.innerHTML += eventHtml;
                }
            });
        } catch (error) {
            console.error('Error fetching sheet:', error);
            document.getElementById('loader').innerText = 'שגיאה בטעינת הנתונים.';
        }
    }

    fetchEvents();
</script>

</body>
</html>
