<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <!-- תגיות Meta לתצוגה מקדימה (WhatsApp/Social Media) -->
    <meta property="og:title" content="אירועים קרובים ג'1">
    <meta property="og:description" content="לוח אירועים, מבחנים ומטלות לכיתה ג'1.">
    <!-- וודא שהקובץ thumbnail.png נמצא בתיקייה הראשית ב-GitHub וגודלו קטן מ-300KB -->
    <meta property="og:image" content="https://ronel99.github.io/kids_school_eitan/thumbnail.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://ronel99.github.io/kids_school_eitan/">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://ronel99.github.io/kids_school_eitan/thumbnail.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>אירועים קרובים ג'1</title>
    
    <style>
        :root {
            --primary-blue: #3b82f6;
            --secondary-green: #10b981;
            --text-main: #1e293b;
            --text-sub: #475569;
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 15px;
            margin: 0;
            direction: rtl;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* תמונת כותרת במקום H1 */
        .header-image {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 20px auto;
            border-radius: 12px;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .event-item {
            display: flex;
            flex-direction: row-reverse; /* יישור: תאריך מימין, כפתורים משמאל */
            align-items: center;
            padding: 12px;
            border-radius: 16px;
            background: #fff;
            border: 1px solid #f1f5f9;
            gap: 10px;
        }

        .date {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            width: 75px;
            flex-shrink: 0;
            text-align: right;
        }

        .title {
            flex-grow: 1;
            font-size: 1rem;
            color: var(--text-sub);
            text-align: right;
            font-weight: 500;
            line-height: 1.3;
        }

        .action-buttons {
            display: flex;
            flex-direction: row-reverse; /* כפתור יומן מימין לכפתור חומר */
            gap: 6px;
            flex-shrink: 0;
            align-items: center;
        }

        .btn-link {
            text-decoration: none;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.2s;
            white-space: nowrap; /* מונע מהטקסט בכפתור לרדת שורה */
        }

        .btn-material {
            background-color: var(--primary-blue);
            color: white;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.15);
        }

        .btn-calendar {
            background-color: white;
            color: var(--secondary-green);
            border: 1px solid var(--secondary-green);
            padding: 7px; /* שומר על הכפתור ריבועי יותר */
        }

        .btn-link:hover {
            transform: translateY(-1px);
            filter: brightness(0.95);
        }

        .loading { text-align: center; color: #94a3b8; padding: 20px; }

        /* התאמות למסכים קטנים מאוד (מובייל) */
        @media (max-width: 400px) {
            .event-item { padding: 10px 8px; gap: 5px; }
            .date { width: 55px; font-size: 0.85rem; }
            .title { font-size: 0.9rem; }
            .btn-link { padding: 6px 8px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- כותרת תמונה -->
    <img src="thumbnail.png" alt="אירועים קרובים ג'1" class="header-image">
    
    <div id="loader" class="loading">טוען נתונים...</div>
    <div id="event-list" class="event-list"></div>
</div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3CbYUVUDzXq2mZ1eZ0u1VQPJuZ7tUj3cGjYad9WDHq5ezf5kveHHQ2UrAcKWlV-7dJsgKM35tsud7/pub?gid=0&single=true&output=csv';
    const CACHE_BUSTER = `&t=${new Date().getTime()}`;

    function generateCalendarLink(title, dateStr) {
        try {
            const parts = dateStr.split('/');
            const day = parts[0].trim().padStart(2, '0');
            const month = parts[1].trim().split('-')[0].padStart(2, '0'); // מטפל בטווח תאריכים
            const year = new Date().getFullYear();
            const formattedDate = `${year}${month}${day}`;
            const googleDate = `${formattedDate}/${formattedDate}`;
            const baseUrl = "https://www.google.com/calendar/render?action=TEMPLATE";
            return `${baseUrl}&text=${encodeURIComponent(title + " - ג'1")}&dates=${googleDate}`;
        } catch (e) { return "#"; }
    }

    function formatDriveLink(url) {
        if (url.includes('drive.google.com')) {
            const fileIdMatch = url.match(/\/d\/([^/]+)/) || url.match(/id=([^&]+)/);
            if (fileIdMatch && fileIdMatch[1]) {
                return `https://drive.google.com/file/d/${fileIdMatch[1]}/view?usp=sharing`;
            }
        }
        return url;
    }

    function getFileIcon(buttonText) {
        if (buttonText.includes('מבחן') || buttonText.includes('חומר')) return '📄';
        if (buttonText.includes('מצגת') || buttonText.includes('צפה')) return '🖼️';
        return '📂';
    }

    async function fetchEvents() {
        try {
            const response = await fetch(SHEET_CSV_URL + CACHE_BUSTER);
            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1); 
            const listContainer = document.getElementById('event-list');
            
            document.getElementById('loader').style.display = 'none';
            listContainer.innerHTML = '';

            rows.forEach(row => {
                // פיצול חכם שמטפל בפסיקים בתוך מרכאות (אם יש)
                const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/"/g, '').trim());
                
                if (columns.length >= 2) {
                    const dateStr = columns[0];
                    const title = columns[1];
                    let link = columns[2] || '';
                    let buttonText = (columns[3] && columns[3] !== "") ? columns[3] : "חומר";

                    const calendarUrl = generateCalendarLink(title, dateStr);
                    const hasLink = link.toLowerCase().startsWith('http');
                    const icon = getFileIcon(buttonText);

                    let html = `
                        <div class="event-item">
                            <span class="date">${dateStr}</span>
                            <span class="title">${title}</span>
                            <div class="action-buttons">
                                <a href="${calendarUrl}" target="_blank" class="btn-link btn-calendar" title="הוסף ליומן">
                                    <span>📅</span>
                                </a>
                                ${hasLink ? `
                                    <a href="${formatDriveLink(link)}" target="_blank" class="btn-link btn-material">
                                        <span>${icon}</span>
                                        <span>${buttonText}</span>
                                    </a>
                                ` : ''}
                            </div>
                        </div>
                    `;
                    listContainer.innerHTML += html;
                }
            });
        } catch (error) {
            document.getElementById('loader').innerText = 'שגיאה בטעינת הנתונים.';
        }
    }

    fetchEvents();
</script>

</body>
</html>
