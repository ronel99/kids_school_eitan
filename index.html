<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אירועים קרובים ג'1</title>
    
    <!-- תגיות Meta לתצוגה מקדימה -->
    <meta property="og:title" content="אירועים קרובים ג'1">
    <meta property="og:image" content="https://ronel99.github.io/kids_school_eitan/thumbnail.png">
    <meta property="og:type" content="website">

    <style>
        :root {
            --primary-blue: #3b82f6;
            --secondary-green: #10b981;
            --text-main: #1e293b;
            --text-sub: #475569;
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 15px;
            margin: 0;
            direction: rtl; /* יישור כללי לימין */
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 20px;
            box-sizing: border-box;
        }

        .header-image {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 20px auto;
            border-radius: 12px;
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .event-item {
            display: flex;
            flex-direction: row; /* סדר רגיל: כפתורים בימין, תאריך בשמאל */
            align-items: center;
            padding: 12px;
            border-radius: 16px;
            background: #fff;
            border: 1px solid #f1f5f9;
            gap: 12px;
        }

        /* כפתורים בצד ימין */
        .action-buttons {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* הטקסט באמצע */
        .title {
            flex-grow: 1;
            font-size: 1rem;
            color: var(--text-sub);
            text-align: right;
            font-weight: 500;
            line-height: 1.3;
        }

        /* התאריך בצד שמאל */
        .date {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            width: auto;
            min-width: 50px;
            flex-shrink: 0;
            text-align: left; /* יישור לשמאל כמו ב-image.png */
        }

        .btn-link {
            text-decoration: none;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .btn-material {
            background-color: var(--primary-blue);
            color: white;
        }

        .btn-calendar {
            background-color: white;
            color: var(--secondary-green);
            border: 1px solid var(--secondary-green);
        }

        .loading { text-align: center; color: #94a3b8; padding: 20px; }

        /* התאמה למובייל - מניעת דחיסה של הטקסט */
        @media (max-width: 450px) {
            .event-item { padding: 10px; gap: 8px; }
            .title { font-size: 0.9rem; }
            .date { font-size: 0.9rem; min-width: 45px; }
            .btn-link { padding: 6px 8px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="thumbnail.png" alt="אירועים קרובים" class="header-image">
    <div id="loader" class="loading">טוען נתונים...</div>
    <div id="event-list" class="event-list"></div>
</div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3CbYUVUDzXq2mZ1eZ0u1VQPJuZ7tUj3cGjYad9WDHq5ezf5kveHHQ2UrAcKWlV-7dJsgKM35tsud7/pub?gid=0&single=true&output=csv';

    async function fetchEvents() {
        try {
            const response = await fetch(SHEET_CSV_URL + `&t=${Date.now()}`);
            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1); 
            const listContainer = document.getElementById('event-list');
            
            document.getElementById('loader').style.display = 'none';
            listContainer.innerHTML = '';

            rows.forEach(row => {
                const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/"/g, '').trim());
                if (columns.length >= 2) {
                    const dateStr = columns[0];
                    const title = columns[1];
                    const link = columns[2] || '';
                    const buttonText = columns[3] || "חומר";

                    // יצירת לינק ליומן (פשוט)
                    const calendarUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}`;

                    let html = `
                        <div class="event-item">
                            <div class="action-buttons">
                                ${link ? `
                                    <a href="${link}" target="_blank" class="btn-link btn-material">
                                        <span>📂</span><span>${buttonText}</span>
                                    </a>
                                ` : ''}
                                <a href="${calendarUrl}" target="_blank" class="btn-link btn-calendar">
                                    <span>📅</span>
                                </a>
                            </div>
                            <span class="title">${title}</span>
                            <span class="date">${dateStr}</span>
                        </div>
                    `;
                    listContainer.innerHTML += html;
                }
            });
        } catch (error) {
            document.getElementById('loader').innerText = 'שגיאה בטעינה.';
        }
    }
    fetchEvents();
</script>

</body>
</html>
